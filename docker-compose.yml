services:
  bot:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      BOT_MODE: ${BOT_MODE:-paper}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 4096M
    networks:
      - sniper

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    networks:
      - sniper

volumes:
  redis-data:

networks:
  sniper:
    driver: bridge
