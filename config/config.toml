# ─── Solana Meme-Coin Sniping Bot Configuration ───

[general]
# Mode: "BACKTEST" | "DRY_RUN" | "LIVE"
mode = "BACKTEST"

# Logging level: DEBUG, INFO, WARNING, ERROR
log_level = "INFO"

[solana]
# RPC endpoint (use free-tier: Helius, QuickNode, dRPC, Chainstack)
rpc_url = "https://api.mainnet-beta.solana.com"
ws_url = "wss://api.mainnet-beta.solana.com"

# Commitment level
commitment = "confirmed"

# Rate limits (requests per second)
max_rps = 5

[solana.devnet]
rpc_url = "https://api.devnet.solana.com"
ws_url = "wss://api.devnet.solana.com"

[strategy]
# ── Rule-based parameters ──
# Minimum liquidity pool in SOL to consider buying
min_lp_sol = 1.0

# Maximum time since launch (seconds) to still consider
max_age_seconds = 10

# Minimum unique buyers to confirm interest
min_unique_buyers = 3

# Maximum total spend per token (SOL)
max_spend_per_token_sol = 0.5

# Default position size (SOL)
default_position_sol = 0.1

# Take-profit multiplier (e.g., 2.0 = 2x)
take_profit_multiplier = 3.0

# Stop-loss fraction (e.g., 0.5 = sell if price drops 50%)
stop_loss_fraction = 0.5

# Maximum concurrent open positions
max_open_positions = 5

[ml]
# Enable ML scoring overlay
enabled = false

# Model type: "nn" | "xgb" | "ensemble"
model_type = "ensemble"

# Minimum ML score to allow trade (0.0 - 1.0)
score_threshold = 0.6

# Scale position size by ML score
scale_by_score = true

# Paths to saved models
nn_model_path = "ml/saved_models/nn_model.pt"
xgb_model_path = "ml/saved_models/xgb_model.json"

[backtest]
# Database path for backtest events
db_path = "data/events.db"

# Simulated slippage (fraction, e.g., 0.01 = 1%)
slippage = 0.02

# Simulated gas/priority fee per trade (SOL)
gas_cost_sol = 0.0005

# Initial bankroll (SOL)
initial_bankroll_sol = 10.0

[data]
# SQLite database path
db_path = "data/events.db"

# How often to poll for new events (seconds) in non-websocket mode
poll_interval_seconds = 2

[vps]
# VPS-specific settings
restart_on_error = true
max_restart_attempts = 5
restart_delay_seconds = 30
heartbeat_interval_seconds = 60
