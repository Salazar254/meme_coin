services:
  sniper-v3:
    image: node:20-slim
    container_name: sniper-v3
    restart: unless-stopped
    working_dir: /app
    env_file:
      - .env
    volumes:
      - ./:/app
    command: >
      sh -c "npm ci --omit=optional &&
             npx ts-node src/engine/sniper_engine_v3.ts"
    ports:
      - "${HEALTH_PORT:-8080}:8080"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get({host:'127.0.0.1',port:process.env.HEALTH_PORT||8080,path:'/health'},res=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
