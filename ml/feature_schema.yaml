version: 1
features:
  rugPullRisk:
    type: float
    range: [0, 1]
    formula: "clamp(rug_pull_risk, 0, 1)"
    source: on_chain_pool_state
  honeypotRisk:
    type: float
    range: [0, 1]
    formula: "clamp(honeypot_risk, 0, 1)"
    source: simulation_and_rugcheck_raw_signals
  lpBurnGap:
    type: float
    range: [0, 1]
    formula: "1 - lp_burn_pct"
    source: lp_lock_or_burn_state
  transferTaxPct:
    type: float
    range: [0, 1]
    formula: "transfer_tax_pct"
    source: token_program_metadata
  topHolderPct:
    type: float
    range: [0, 1]
    formula: "top_holder_pct"
    source: holder_distribution
  devHoldPct:
    type: float
    range: [0, 1]
    formula: "dev_hold_pct"
    source: holder_distribution
  mutableMetadata:
    type: binary
    range: [0, 1]
    formula: "1 if metadata mutable else 0"
    source: token_metadata_program
  mintAuthority:
    type: binary
    range: [0, 1]
    formula: "0 if mint authority renounced else 1"
    source: token_program_state
  freezeAuthority:
    type: binary
    range: [0, 1]
    formula: "0 if freeze authority renounced else 1"
    source: token_program_state
  volatility1m:
    type: float
    range: [0, 1]
    formula: "one minute realized volatility"
    source: decision_time_price_feed
  lowLiquidity:
    type: float
    range: [0, 1]
    formula: "1 / max(liquidity_sol, 0.05) / 5"
    source: on_chain_pool_state
  lowBuyers:
    type: float
    range: [0, 1]
    formula: "1 - unique_buyers / 40"
    source: decision_time_trade_tape
  rugcheckLpUnlocked:
    type: float
    range: [0, 1]
    formula: "1 - raw_lp_locked_pct / 100"
    source: rugcheck_raw_signals
  rugcheckDangerSignals:
    type: float
    range: [0, 1]
    formula: "danger_or_critical_signal_count / 4"
    source: rugcheck_raw_signals
excluded_features:
  - rugcheckScore
  - futureReturnPct
